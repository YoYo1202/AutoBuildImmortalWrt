name: Build x86_64 ImmortalWrt LXC Template

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择版本"
        required: false
        default: "25.12.0"
        type: choice
        options:
          - 25.12.0
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      size:
        description: '固件大小 (MB)'
        required: true
        default: '1024'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build x86_64 ImmortalWrt firmware
        run: |
          luci_version="${{ github.event.inputs.luci_version }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          size="${{ github.event.inputs.size }}"
          tag=x86-64-openwrt-${luci_version}

          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files/etc/uci-defaults:/home/build/immortalwrt/files/etc/uci-defaults" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/openwrt/build.sh" \
            -e PROFILE=$size \
            -e LUCI_VERSION=$luci_version \
            -e INCLUDE_DOCKER=$include_docker \
            -e ENABLE_PPPOE=false \
            immortalwrt/imagebuilder:$tag /bin/bash /home/build/openwrt/build.sh

          echo "=== ImageBuilder output ==="
          ls -la ${{ github.workspace }}/bin/targets/x86/64/

      - name: Extract rootfs.tar.gz from ext4 image
        run: |
          cd ${{ github.workspace }}/bin/targets/x86/64/

          # 先看有没有直接生成的 rootfs.tar.gz
          if ls *rootfs.tar.gz 2>/dev/null; then
            echo "✅ rootfs.tar.gz 已存在，直接使用"
          else
            echo "⚙️ 从 ext4-rootfs.img 提取 rootfs.tar.gz..."
            EXT4_IMG=$(ls *generic-ext4-rootfs.img.gz 2>/dev/null | head -1)
            if [ -z "$EXT4_IMG" ]; then
              # 回退：从 ext4-combined 镜像提取（需跳过内核分区）
              COMBINED=$(ls *generic-ext4-combined-efi.img.gz 2>/dev/null | head -1)
              if [ -z "$COMBINED" ]; then
                echo "❌ 找不到可提取的镜像文件"
                ls -la
                exit 1
              fi
              echo "→ 从 combined 镜像提取（跳过内核分区）"
              zcat "$COMBINED" > combined.img
              ROOTFS_OFFSET=$(fdisk -l -o Start combined.img | tail -1 | tr -d ' ')
              mount -o loop,offset=$((ROOTFS_OFFSET * 512)) combined.img /mnt
            else
              echo "→ 从 ext4-rootfs.img 提取"
              zcat "$EXT4_IMG" > rootfs.img
              mount -o loop rootfs.img /mnt
            fi

            tar czf immortalwrt-x86-64-generic-rootfs.tar.gz -C /mnt .
            umount /mnt
            echo "✅ rootfs.tar.gz 提取完成"
          fi

          ls -lh *rootfs.tar.gz

      - name: Upload LXC template as release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Autobuild-x86-64-lxc-${{ github.event.inputs.luci_version }}
          body: |
            ## ImmortalWrt ${{ github.event.inputs.luci_version }} LXC 模板

            ### 在 PVE 上创建 LXC 容器
            ```bash
            # 下载到 PVE
            cd /var/lib/vz/template/cache/
            # 从 Release 下载 rootfs.tar.gz 放到此目录

            # 创建容器
            pct create <CTID> /var/lib/vz/template/cache/immortalwrt-x86-64-generic-rootfs.tar.gz \
              --arch amd64 \
              --ostype unmanaged \
              --rootfs local-lvm:1 \
              --memory 512 \
              --cores 2 \
              --unprivileged 1

            # 设置网络（桥接到 vmbr0）
            pct set <CTID> --net0 name=eth0,bridge=vmbr0,firewall=0

            # 启动
            pct start <CTID>
            ```

            ### 预装插件
            - 文件管理器 + 磁盘管理
            - Argon 主题 + 配置
            - TTYD + curl + openssh-sftp-server
            - Docker Manager（如选）
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*rootfs.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
